<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard การใช้ไฟฟ้า Nakornin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; }
        .chart-container { margin-bottom: 50px; height: 400px; width: 100%; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-box { padding: 20px; background: #ffffff; border: 1px solid #e0e0e0; border-radius: 10px; min-width: 200px; text-align: center; }
        .stat-box strong { font-size: 24px; color: #1a73e8; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ระบบวิเคราะห์การใช้ไฟฟ้า (Nakornin)</h1>
    
    <div class="stats">
        <div class="stat-box">การใช้ไฟวันนี้ (รวม) <strong id="todayTotal">0</strong> kWh</div>
        <div class="stat-box">กำลังไฟปัจจุบัน <strong id="currentPower">0</strong> W</div>
    </div>

    <div class="chart-container">
        <canvas id="todayBarChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="averageLineChart"></canvas>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPE61vZhx8Fi4_SEQyWuk-aA7FHGryhx5ff_wIgxhpVWMxULlCRUGbgPwG17OTK4phtAHWdTZ7ik8h/pub?gid=0&single=true&output=csv'; // *** วาง URL ของคุณที่นี่ ***

    function parseDate(dateStr) {
        if (!dateStr) return new Date(NaN);
        const parts = dateStr.split(' ');
        const d = parts[0].split('/');
        return new Date(`${d[2]}-${d[1]}-${d[0]}T${parts[1]}`);
    }

    async function fetchData() {
        Papa.parse(CSV_URL, {
            download: true, header: true, dynamicTyping: true,
            complete: function(results) { processData(results.data); }
        });
    }

    function processData(data) {
        const cleanData = data.filter(d => d['Date-Time']);
        if (cleanData.length === 0) return;

        const latest = cleanData[cleanData.length - 1];
        document.getElementById('currentPower').innerText = latest['Total Power (W)'] || 0;

        // เตรียมข้อมูล 24 ชั่วโมง (0-23)
        const hours = Array.from({length: 24}, (_, i) => i);
        const todayUsage = new Array(24).fill(0);
        const avgSums = new Array(24).fill(0);
        const avgCounts = new Array(24).fill(0);

        const todayStr = new Date().toDateString();

        cleanData.forEach(d => {
            const date = parseDate(d['Date-Time']);
            if (isNaN(date)) return;
            
            const h = date.getHours();
            const val = d['Usage (kWh)'] || 0;

            // ข้อมูลของวันนี้
            if (date.toDateString() === todayStr) {
                todayUsage[h] += val;
            }

            // ข้อมูลสำหรับค่าเฉลี่ยรายชั่วโมง (จากประวัติทั้งหมด)
            avgSums[h] += val;
            avgCounts[h]++;
        });

        const hourlyAverage = avgSums.map((sum, i) => avgCounts[i] > 0 ? (sum / (avgCounts[i]/24)).toFixed(2) : 0);
        document.getElementById('todayTotal').innerText = todayUsage.reduce((a, b) => a + b, 0).toFixed(2);

        renderCharts(hours, todayUsage, hourlyAverage);
    }

    let barChart, lineChart;

    function renderCharts(labels, todayData, avgData) {
        if (barChart) barChart.destroy();
        if (lineChart) lineChart.destroy();

        // 1. กราฟวันนี้ (Bar Graph)
        barChart = new Chart(document.getElementById('todayBarChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'การใช้ไฟวันนี้ (kWh)',
                    data: todayData,
                    backgroundColor: 'rgba(52, 152, 219, 0.7)',
                    borderColor: '#2980b9',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'ปริมาณการใช้ไฟรายชั่วโมง (วันนี้)' } }
            }
        });

        // 2. กราฟค่าเฉลี่ย (Line Graph)
        lineChart = new Chart(document.getElementById('averageLineChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'ค่าเฉลี่ยการใช้ไฟรายชั่วโมง (kWh)',
                    data: avgData,
                    borderColor: '#2ecc71',
                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                    fill: true,
                    tension: 0.4 // เส้นโค้ง
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'แนวโน้มการใช้ไฟเฉลี่ยรายชั่วโมง (Load Profile)' } }
            }
        });
    }

    fetchData();
    setInterval(fetchData, 300000);
</script>
</body>
</html>
