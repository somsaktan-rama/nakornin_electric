<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E_PC473 Electricity Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .chart-container { margin-bottom: 40px; position: relative; height: 40vh; width: 100%; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; text-align: center; flex-wrap: wrap; }
        .stat-box { padding: 15px; background: #ecf0f1; border-radius: 8px; flex: 1; margin: 5px 10px; min-width: 150px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ระบบมอนิเตอร์ไฟฟ้า 3 เฟส (PC473)</h1>
    
    <div class="stats">
        <div class="stat-box">
            <div>การใช้ไฟรอบล่าสุด</div>
            <strong id="currentUsage">0</strong> kWh
        </div>
        <div class="stat-box">
            <div>กำลังไฟปัจจุบัน</div>
            <strong id="currentPower">0</strong> W
        </div>
    </div>

    <div class="chart-container">
        <canvas id="hourlyChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="weeklyChart"></canvas>
    </div>
</div>

<script>
    // *** สำคัญ: วาง URL ตรงนี้ และต้องมีเครื่องหมาย ' ครอบหัวท้าย ***
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPE61vZhx8Fi4_SEQyWuk-aA7FHGryhx5ff_wIgxhpVWMxULlCRUGbgPwG17OTK4phtAHWdTZ7ik8h/pub?gid=0&single=true&output=csv'; 

    async function fetchData() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                console.log("ดึงข้อมูลสำเร็จ: ", results.data); // ดูข้อมูลดิบใน Console
                processData(results.data);
            },
            error: function(error) {
                console.error("เกิดข้อผิดพลาดในการดึง CSV: ", error);
            }
        });
    }

    function processData(data) {
        // กรองเฉพาะแถวที่มีข้อมูล Date-Time จริงๆ (ป้องกันแถวว่าง)
        // *** หาก Sheet ของคุณใช้ชื่อคอลัมน์อื่น ให้เปลี่ยนคำว่า Date-Time ด้านล่างนี้ ***
        const cleanData = data.filter(d => d['Date-Time'] != null);
        
        if(cleanData.length === 0) {
            console.warn("ไม่พบข้อมูล หรือชื่อคอลัมน์ไม่ตรง");
            return;
        }

        // 1. ดึงข้อมูลแถวสุดท้าย (ล่าสุด) มาแสดงในช่องสถิติ
        const latest = cleanData[cleanData.length - 1];
        
        // *** ตรวจสอบชื่อคอลัมน์ให้ตรงกับใน Google Sheets ของคุณ ***
        document.getElementById('currentPower').innerText = latest['Total Power (W)'] || 0;
        document.getElementById('currentUsage').innerText = latest['Usage (kWh)'] || 0;
        
        // 2. กราฟรายชั่วโมง (ดึง 24 แถวล่าสุด)
        const last24 = cleanData.slice(-24);
        const hourlyLabels = last24.map(d => {
            const dateObj = new Date(d['Date-Time']);
            return !isNaN(dateObj) ? dateObj.getHours() + ':00' : 'N/A';
        });
        const hourlyUsage = last24.map(d => d['Usage (kWh)'] || 0);

        // 3. กราฟรายสัปดาห์ (จันทร์-อาทิตย์)
        const weekDays = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
        const weeklyData = [0, 0, 0, 0, 0, 0, 0];

        cleanData.forEach(d => {
            const dateObj = new Date(d['Date-Time']);
            if(!isNaN(dateObj)) {
                const dayIndex = dateObj.getDay();
                weeklyData[dayIndex] += (d['Usage (kWh)'] || 0);
            }
        });

        renderCharts(hourlyLabels, hourlyUsage, weekDays, weeklyData);
    }

    let hourlyChartInstance = null;
    let weeklyChartInstance = null;

    function renderCharts(hLabels, hData, wLabels, wData) {
        // ทำลายกราฟเก่าก่อนวาดใหม่ (ป้องกันการวาดซ้อนเมื่อ Auto-update)
        if(hourlyChartInstance) hourlyChartInstance.destroy();
        if(weeklyChartInstance) weeklyChartInstance.destroy();

        hourlyChartInstance = new Chart(document.getElementById('hourlyChart'), {
            type: 'bar',
            data: {
                labels: hLabels,
                datasets: [{ label: 'การใช้ไฟรอบล่าสุด (kWh)', data: hData, backgroundColor: '#3498db' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        weeklyChartInstance = new Chart(document.getElementById('weeklyChart'), {
            type: 'bar',
            data: {
                labels: wLabels,
                datasets: [{ label: 'ปริมาณการใช้ไฟรวมรายวัน (kWh)', data: wData, backgroundColor: '#2ecc71' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    fetchData();
    setInterval(fetchData, 300000); // อัปเดตทุก 5 นาที
</script>

</body>
</html>
