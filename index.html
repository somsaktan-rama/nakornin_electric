<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการใช้ไฟฟ้า Nakornin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .chart-container { height: 500px; width: 100%; margin-top: 20px; }
        select { padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; cursor: pointer; outline: none; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { flex: 1; padding: 15px; background: #f8f9fa; border-radius: 10px; text-align: center; border-left: 5px solid #1a73e8; }
        .stat-box small { color: #666; display: block; }
        .stat-box strong { font-size: 20px; color: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2>วิเคราะห์ประวัติไฟฟ้า รายวัน-พ.ศ.</h2>
        <select id="dateSelect" onchange="updateView()">
            <option value="">กำลังโหลดข้อมูล...</option>
        </select>
    </div>

    <div class="stats">
        <div class="stat-box"><small>ใช้ไฟรวมวันที่เลือก</small><strong id="selectedTotal">0.00</strong> kWh</div>
        <div class="stat-box"><small>กำลังไฟเฉลี่ยวันที่เลือก</small><strong id="avgPower">0</strong> W</div>
    </div>

    <div class="chart-container">
        <canvas id="mainMixedChart"></canvas>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPE61vZhx8Fi4_SEQyWuk-aA7FHGryhx5ff_wIgxhpVWMxULlCRUGbgPwG17OTK4phtAHWdTZ7ik8h/pub?gid=0&single=true&output=csv'; // *** วาง URL ของคุณที่นี่ ***
    let allData = [];
    let groupedData = {};
    let globalAvgHourly = new Array(24).fill(0);
    let mainChart;

    function parseDate(dateStr) {
        if (!dateStr) return new Date(NaN);
        const parts = dateStr.split(' ');
        const d = parts[0].split('/');
        return new Date(`${d[2]}-${d[1]}-${d[0]}T${parts[1]}`);
    }

    async function fetchData() {
        Papa.parse(CSV_URL, {
            download: true, header: true, dynamicTyping: true,
            complete: function(results) { 
                allData = results.data;
                initializeDashboard();
            }
        });
    }

    function initializeDashboard() {
        // ค้นหาคีย์คอลัมน์อัตโนมัติ
        let dateKey, usageKey, powerKey;
        for (let key in allData[0]) {
            let k = key.toLowerCase().replace(/\s/g, '');
            if (k.includes('time') || k.includes('date')) dateKey = key;
            if (k.includes('usage')) usageKey = key;
            if (k.includes('power')) powerKey = key;
        }

        const sumHourly = new Array(24).fill(0);
        const countHourly = new Array(24).fill(0);
        groupedData = {};

        allData.forEach(d => {
            const date = parseDate(d[dateKey]);
            if (isNaN(date)) return;

            // จัดกลุ่มตามวันที่รูปแบบไทย พ.ศ.
            const dateLabel = date.toLocaleDateString('th-TH', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            });
            const h = date.getHours();
            const usage = d[usageKey] || 0;
            const power = d[powerKey] || 0;

            if (!groupedData[dateLabel]) {
                groupedData[dateLabel] = { hourlyUsage: new Array(24).fill(0), hourlyPower: new Array(24).fill(0), count: new Array(24).fill(0), rawDate: date };
            }
            
            groupedData[dateLabel].hourlyUsage[h] += usage;
            groupedData[dateLabel].hourlyPower[h] += power;
            groupedData[dateLabel].count[h]++;

            // คำนวณค่าเฉลี่ยรายชั่วโมงรวม (Global Average)
            sumHourly[h] += usage;
            countHourly[h]++;
        });

        globalAvgHourly = sumHourly.map((sum, i) => countHourly[i] > 0 ? (sum / (countHourly[i]/24)).toFixed(2) : 0);

        // สร้างรายการเลือกวันที่ (เรียงจากใหม่สุดไปเก่าสุด)
        const sortedDates = Object.keys(groupedData).sort((a, b) => groupedData[b].rawDate - groupedData[a].rawDate);
        const select = document.getElementById('dateSelect');
        select.innerHTML = '';
        sortedDates.forEach(date => {
            const opt = document.createElement('option');
            opt.value = date;
            opt.innerHTML = date;
            select.appendChild(opt);
        });

        updateView();
    }

    function updateView() {
        const selectedDate = document.getElementById('dateSelect').value;
        const data = groupedData[selectedDate];
        if (!data) return;

        const totalUsage = data.hourlyUsage.reduce((a, b) => a + b, 0);
        document.getElementById('selectedTotal').innerText = totalUsage.toFixed(2);
        
        const totalPowerAvg = data.hourlyPower.reduce((a, b) => a + b, 0) / data.hourlyPower.length;
        document.getElementById('avgPower').innerText = totalPowerAvg.toFixed(0);

        renderMixedChart(selectedDate, data.hourlyUsage, globalAvgHourly);
    }

    function renderMixedChart(dateLabel, todayData, avgData) {
        if (mainChart) mainChart.destroy();

        mainChart = new Chart(document.getElementById('mainMixedChart'), {
            data: {
                labels: Array.from({length: 24}, (_, i) => i),
                datasets: [
                    {
                        type: 'line',
                        label: 'ค่าเฉลี่ยรายชั่วโมง (kWh)',
                        data: avgData,
                        borderColor: '#e74c3c',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: false,
                        order: 1
                    },
                    {
                        type: 'bar',
                        label: `การใช้ไฟ (${dateLabel}) (kWh)`,
                        data: todayData,
                        backgroundColor: 'rgba(26, 115, 232, 0.7)',
                        borderRadius: 5,
                        order: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: true, title: { display: true, text: 'หน่วย (kWh)' } },
                    x: { title: { display: true, text: 'ชั่วโมง (0-23)' } }
                }
            }
        });
    }

    fetchData();
</script>
</body>
</html>
