<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E_PC473 Electricity Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .chart-container { margin-bottom: 40px; position: relative; height: 40vh; width: 100%; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; text-align: center; flex-wrap: wrap; }
        .stat-box { padding: 15px; background: #ecf0f1; border-radius: 8px; flex: 1; margin: 5px 10px; min-width: 150px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ระบบมอนิเตอร์ไฟฟ้า 3 เฟส (Nakornin)</h1>
    
    <div class="stats">
        <div class="stat-box">
            <div>การใช้ไฟรอบล่าสุด</div>
            <strong id="currentUsage">0</strong> kWh
        </div>
        <div class="stat-box">
            <div>กำลังไฟปัจจุบัน</div>
            <strong id="currentPower">0</strong> W
        </div>
    </div>

    <div class="chart-container">
        <canvas id="hourlyChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="weeklyChart"></canvas>
    </div>
</div>

<script>
    // *** สำคัญ: วาง URL ของคุณตรงนี้ ***
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPE61vZhx8Fi4_SEQyWuk-aA7FHGryhx5ff_wIgxhpVWMxULlCRUGbgPwG17OTK4phtAHWdTZ7ik8h/pub?gid=0&single=true&output=csv'; 

    // 🌟 ฟังก์ชันใหม่: ตัวแก้ปัญหา JavaScript อ่านวันที่แบบไทยไม่ออก 
    function parseCustomDate(dateStr) {
        if (!dateStr || typeof dateStr !== 'string') return new Date(NaN);
        // แยกส่วน วันที่ และ เวลา ออกจากกัน (คั่นด้วยช่องว่าง)
        const parts = dateStr.split(' ');
        if (parts.length < 2) return new Date(NaN);
        
        // แยก วัน/เดือน/ปี (เช่น 19/04/2026)
        const dateParts = parts[0].split('/');
        if (dateParts.length !== 3) return new Date(NaN);
        
        // สลับตำแหน่งเป็น ปี-เดือน-วัน (2026-04-19T19:56:36) เพื่อให้ JS อ่านออก
        const isoString = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}T${parts[1]}`;
        return new Date(isoString);
    }

    async function fetchData() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                processData(results.data);
            }
        });
    }

    function processData(data) {
        // กรองเอาเฉพาะแถวที่มีข้อมูล Date-Time
        const cleanData = data.filter(d => d['Date-Time'] != null && d['Date-Time'].toString().trim() !== "");
        
        if(cleanData.length === 0) return;

        // 1. ช่องสถิติด้านบน
        const latest = cleanData[cleanData.length - 1];
        document.getElementById('currentPower').innerText = latest['Total Power (W)'] || 0;
        
        // ปัดเศษจุดทศนิยม 2 ตำแหน่งให้สวยงาม
        let usageVal = latest['Usage (kWh)'] || 0;
        document.getElementById('currentUsage').innerText = typeof usageVal === 'number' ? usageVal.toFixed(2) : usageVal;
        
        // 2. ข้อมูลกราฟรายชั่วโมง (24 แถวล่าสุด)
        const last24 = cleanData.slice(-24);
        const hourlyLabels = last24.map(d => {
            const dateObj = parseCustomDate(d['Date-Time']); // ใช้ฟังก์ชันแปลงวันที่ที่เราสร้างขึ้น
            return !isNaN(dateObj) ? dateObj.getHours() + ':00' : 'N/A';
        });
        const hourlyUsage = last24.map(d => d['Usage (kWh)'] || 0);

        // 3. ข้อมูลกราฟรายสัปดาห์ (แยกจันทร์-อาทิตย์)
        const weekDays = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
        const weeklyData = [0, 0, 0, 0, 0, 0, 0];

        cleanData.forEach(d => {
            const dateObj = parseCustomDate(d['Date-Time']); // ใช้ฟังก์ชันแปลงวันที่ที่เราสร้างขึ้น
            if(!isNaN(dateObj)) {
                const dayIndex = dateObj.getDay();
                weeklyData[dayIndex] += (d['Usage (kWh)'] || 0);
            }
        });

        // ปัดเศษทศนิยม 2 ตำแหน่งให้แท่งกราฟ
        const roundedWeeklyData = weeklyData.map(val => Number(val.toFixed(2)));

        renderCharts(hourlyLabels, hourlyUsage, weekDays, roundedWeeklyData);
    }

    let hourlyChartInstance = null;
    let weeklyChartInstance = null;

    function renderCharts(hLabels, hData, wLabels, wData) {
        if(hourlyChartInstance) hourlyChartInstance.destroy();
        if(weeklyChartInstance) weeklyChartInstance.destroy();

        hourlyChartInstance = new Chart(document.getElementById('hourlyChart'), {
            type: 'bar',
            data: {
                labels: hLabels,
                datasets: [{ label: 'การใช้ไฟรายชั่วโมง (kWh)', data: hData, backgroundColor: '#3498db' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        weeklyChartInstance = new Chart(document.getElementById('weeklyChart'), {
            type: 'bar',
            data: {
                labels: wLabels,
                datasets: [{ label: 'ปริมาณการใช้ไฟรวมรายวัน (kWh)', data: wData, backgroundColor: '#2ecc71' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    fetchData();
    setInterval(fetchData, 300000); // รีเฟรชทุก 5 นาที
</script>

</body>
</html>
