<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard การใช้ไฟฟ้า (Nakornin)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .chart-container { margin-bottom: 50px; height: 450px; width: 100%; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-box { padding: 20px; background: #ffffff; border: 1px solid #e0e0e0; border-radius: 10px; min-width: 200px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-box strong { font-size: 26px; color: #1a73e8; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ระบบวิเคราะห์การใช้ไฟฟ้า (E_PC473)</h1>
    
    <div class="stats">
        <div class="stat-box">การใช้ไฟวันนี้ (รวม) <strong id="todayTotal">0</strong> kWh</div>
        <div class="stat-box">กำลังไฟปัจจุบัน <strong id="currentPower">0</strong> W</div>
    </div>

    <div class="chart-container">
        <canvas id="hourlyMixedChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="weeklyMixedChart"></canvas>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPE61vZhx8Fi4_SEQyWuk-aA7FHGryhx5ff_wIgxhpVWMxULlCRUGbgPwG17OTK4phtAHWdTZ7ik8h/pub?gid=0&single=true&output=csv'; // *** วาง URL ของคุณที่นี่ ***

    function parseDate(dateStr) {
        if (!dateStr) return new Date(NaN);
        const parts = dateStr.split(' ');
        if(parts.length < 2) return new Date(NaN);
        const d = parts[0].split('/');
        return new Date(`${d[2]}-${d[1]}-${d[0]}T${parts[1]}`);
    }

    async function fetchData() {
        Papa.parse(CSV_URL, {
            download: true, header: true, dynamicTyping: true,
            complete: function(results) { processData(results.data); }
        });
    }

    function processData(data) {
        if (data.length === 0) return;

        // --- Smart Key Finder: ค้นหาชื่อคอลัมน์อัตโนมัติป้องกัน Error เว้นวรรค ---
        let dateKey, powerKey, usageKey;
        const sampleRow = data[0];
        for (let key in sampleRow) {
            const lowerKey = key.toLowerCase().replace(/\s/g, ''); // ตัดช่องว่างออกให้หมดเพื่อเช็ค
            if (lowerKey.includes('time') || lowerKey.includes('date')) dateKey = key;
            if (lowerKey.includes('power')) powerKey = key;
            if (lowerKey.includes('usage')) usageKey = key;
        }

        const cleanData = data.filter(d => d[dateKey]);
        if (cleanData.length === 0) return;

        // อัปเดตช่อง "กำลังไฟปัจจุบัน" จากแถวสุดท้าย
        const latest = cleanData[cleanData.length - 1];
        document.getElementById('currentPower').innerText = latest[powerKey] !== undefined ? latest[powerKey] : 0;

        const now = new Date();
        const todayStr = now.toDateString();
        const currentWeekStart = new Date(now);
        currentWeekStart.setDate(now.getDate() - now.getDay());
        currentWeekStart.setHours(0,0,0,0);

        // ตัวแปรสำหรับกราฟ 24 ชั่วโมง
        const hoursLabel = Array.from({length: 24}, (_, i) => i);
        const todayHourlyUsage = new Array(24).fill(0);
        const sumAvgHourly = new Array(24).fill(0);
        const countAvgHourly = new Array(24).fill(0);
        
        // ตัวแปรเก็บค่า Power (W) เฉลี่ยรายชั่วโมงของวันนี้
        const sumPowerHourly = new Array(24).fill(0);
        const countPowerHourly = new Array(24).fill(0);

        const weekDaysLabel = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
        const thisWeekUsage = new Array(7).fill(0);
        const dailySums = {}; 

        cleanData.forEach(d => {
            const date = parseDate(d[dateKey]);
            if (isNaN(date)) return;
            
            const valUsage = d[usageKey] || 0;
            const valPower = d[powerKey] || 0;
            const h = date.getHours();
            const day = date.getDay();
            const dateOnly = date.toDateString();

            // ข้อมูลของวันนี้ (แยกรายชั่วโมง)
            if (dateOnly === todayStr) {
                todayHourlyUsage[h] += valUsage;
                sumPowerHourly[h] += valPower;
                countPowerHourly[h]++;
            }

            // ค่าเฉลี่ยการใช้ไฟ (kWh) จากประวัติทั้งหมด
            sumAvgHourly[h] += valUsage;
            countAvgHourly[h]++;

            // ข้อมูลรายวัน
            if (!dailySums[dateOnly]) dailySums[dateOnly] = { dayIndex: day, total: 0 };
            dailySums[dateOnly].total += valUsage;

            if (date >= currentWeekStart) {
                thisWeekUsage[day] += valUsage;
            }
        });

        const avgHourlyUsage = sumAvgHourly.map((sum, i) => countAvgHourly[i] > 0 ? Number((sum / countAvgHourly[i]).toFixed(2)) : 0);
        
        // คำนวณ Power เฉลี่ยในแต่ละชั่วโมง (ใช้ null เพื่อให้กราฟข้ามชั่วโมงที่ยังไม่ถึงไป ไม่ให้ตกลงไปที่ 0)
        const todayHourlyPower = sumPowerHourly.map((sum, i) => countPowerHourly[i] > 0 ? Number((sum / countPowerHourly[i]).toFixed(2)) : null);

        const sumWeekDays = new Array(7).fill(0);
        const countWeekDays = new Array(7).fill(0);
        for (const dateKey in dailySums) {
            const dData = dailySums[dateKey];
            sumWeekDays[dData.dayIndex] += dData.total;
            countWeekDays[dData.dayIndex]++;
        }
        const avgWeeklyUsage = sumWeekDays.map((sum, i) => countWeekDays[i] > 0 ? Number((sum / countWeekDays[i]).toFixed(2)) : 0);

        document.getElementById('todayTotal').innerText = todayHourlyUsage.reduce((a, b) => a + b, 0).toFixed(2);

        renderCharts(hoursLabel, todayHourlyUsage, avgHourlyUsage, todayHourlyPower, weekDaysLabel, thisWeekUsage, avgWeeklyUsage);
    }

    let hourlyChart, weeklyChart;

    function renderCharts(hLabels, todayHourly, avgHourly, todayPower, wLabels, thisWeek, avgWeek) {
        if (hourlyChart) hourlyChart.destroy();
        if (weeklyChart) weeklyChart.destroy();

        // 1. กราฟรายชั่วโมง (มี 2 แกน Y)
        hourlyChart = new Chart(document.getElementById('hourlyMixedChart'), {
            type: 'bar',
            data: {
                labels: hLabels,
                datasets: [
                    {
                        type: 'line',
                        label: 'Total Power ของวันนี้ (W)',
                        data: todayPower,
                        borderColor: '#9b59b6', // สีม่วง
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        yAxisID: 'y1', // ผูกกับแกน Y ด้านขวา
                        spanGaps: true, // ข้ามช่วงที่ไม่มีข้อมูลไปเลย
                        order: 0
                    },
                    {
                        type: 'line',
                        label: 'ค่าเฉลี่ยรายชั่วโมง (kWh)',
                        data: avgHourly,
                        borderColor: '#e74c3c',
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        tension: 0.4,
                        yAxisID: 'y', // ผูกกับแกน Y ด้านซ้าย
                        order: 1
                    },
                    {
                        type: 'bar',
                        label: 'การใช้ไฟวันนี้ (kWh)',
                        data: todayHourly,
                        backgroundColor: 'rgba(52, 152, 219, 0.8)',
                        yAxisID: 'y', // ผูกกับแกน Y ด้านซ้าย
                        order: 2
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'เปรียบเทียบการใช้ไฟและกำลังไฟฟ้า (รายชั่วโมง)', font: { size: 16 } } },
                scales: { 
                    y: { 
                        type: 'linear', position: 'left', beginAtZero: true,
                        title: { display: true, text: 'พลังงาน (kWh)' }
                    },
                    y1: { 
                        type: 'linear', position: 'right',
                        title: { display: true, text: 'กำลังไฟฟ้า (W)' },
                        grid: { drawOnChartArea: false } // ป้องกันเส้นกริดของ 2 แกนตีกัน
                    }
                }
            }
        });

        // 2. กราฟรายสัปดาห์
        weeklyChart = new Chart(document.getElementById('weeklyMixedChart'), {
            type: 'bar',
            data: {
                labels: wLabels,
                datasets: [
                    {
                        type: 'line', label: 'ค่าเฉลี่ยรายวัน (kWh)', data: avgWeek,
                        borderColor: '#f39c12', backgroundColor: 'transparent',
                        borderWidth: 2, tension: 0.4, order: 1
                    },
                    {
                        type: 'bar', label: 'การใช้ไฟสัปดาห์นี้ (kWh)', data: thisWeek,
                        backgroundColor: 'rgba(46, 204, 113, 0.8)', borderRadius: 4, order: 2
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'เปรียบเทียบการใช้ไฟรายวัน (สัปดาห์นี้ vs ค่าเฉลี่ย)', font: { size: 16 } } },
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    fetchData();
    setInterval(fetchData, 300000);
</script>
</body>
</html>
